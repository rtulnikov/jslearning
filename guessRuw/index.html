<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Угадай Рыцарский Орден — Prophesy of Pendor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>⚔ Угадай Рыцарский Орден ⚔</h1>
        <div class="subtitle">Mount &amp; Blade: Warband — Prophesy of Pendor</div>
    </header>

    <div class="stats-bar">
        <div class="stat">
            <div class="stat-value" id="score">0</div>
            <div class="stat-label">Побед</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="streak">0</div>
            <div class="stat-label">Серия</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="round">1</div>
            <div class="stat-label">Раунд</div>
        </div>
    </div>

    <div class="order-card">
        <h2><span class="shield-icon">🛡</span> Описание снаряжения</h2>
        <div class="description" id="description"></div>
    </div>

    <div class="word-display" id="wordDisplay"></div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="lives" id="lives"></div>

    <div class="guessed-letters" id="guessedLetters"></div>

    <div class="input-area">
        <input type="text" id="letterInput" maxlength="1" placeholder="?" autocomplete="off">
        <button class="btn" id="guessBtn">Угадать</button>
        <button class="btn" id="guessWordBtn">Угадать слово</button>
    </div>

    <div class="keyboard" id="keyboard"></div>

    <div class="hint-section">
        <button class="btn hint-btn" id="hintBtn">💡 Подсказка (−1 жизнь)</button>
        <div class="hint-text" id="hintText"></div>
    </div>
</div>

<div class="result-overlay" id="resultOverlay">
    <div class="result-box">
        <h2 id="resultTitle"></h2>
        <div class="revealed-name" id="resultName"></div>
        <div class="result-desc" id="resultDesc"></div>
        <button class="btn" id="nextBtn">Следующий орден ➤</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
